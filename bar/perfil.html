<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Perfil do Jogador - Insalubrão</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #0f172a;
      color: #e5e7eb;
    }

    .profile-card {
      background-color: #020617;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    .profile-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #38bdf8;
    }

    .badge-honra {
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .honravel { background: #22c55e; }
    .normal { background: #facc15; color: #000; }
    .bad { background: #ef4444; }

    .nav-tabs .nav-link {
      color: #94a3b8;
    }

    .nav-tabs .nav-link.active {
      background-color: #020617;
      color: #38bdf8;
      border-color: #020617;
    }

    .table {
      color: #e5e7eb;
    }
  </style>
</head>

<body>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <!-- CARD PERFIL -->
      <div class="profile-card text-center mb-4">

        <img src="https://ddragon.leagueoflegends.com/cdn/14.3.1/img/profileicon/4568.png" class="profile-img mb-3">

        <h3>11gaia11 <span class="text-info">#000</span></h3>
        <p class="mb-1">Elo: <strong>Esmeralda I</strong></p>
        <p class="mb-1">Posição no Insalubrão: <strong>Mid / Jungle</strong></p>

        <span class="badge badge-honra honravel mt-2">
          Nível de Honra: Honrável
        </span>
      </div>

      <!-- ABAS -->
      <ul class="nav nav-tabs" id="perfilTabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#historico">
            Histórico
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#punicoes">
            Punições
          </button>
        </li>
      </ul>

      <div class="tab-content p-4 profile-card">

        <!-- HISTÓRICO -->
        <div class="tab-pane fade show active" id="historico">
          <table class="table table-dark table-hover">
            <thead>
              <tr>
                <th>Data</th>
                <th>Campeão</th>
                <th>Resultado</th>
                <th>KDA</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>01/03/2026</td>
                <td>Azir</td>
                <td class="text-success">Vitória</td>
                <td>9 / 2 / 6</td>
              </tr>
              <tr>
                <td>28/02/2026</td>
                <td>Master Yi</td>
                <td class="text-danger">Derrota</td>
                <td>6 / 5 / 3</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- PUNIÇÕES -->
        <div class="tab-pane fade" id="punicoes">
          <table class="table table-dark table-hover">
            <thead>
              <tr>
                <th>Data</th>
                <th>Motivo</th>
                <th>Punição</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>15/02/2026</td>
                <td>AFK</td>
                <td class="text-warning">Advertência</td>
              </tr>
              <tr>
                <td>—</td>
                <td colspan="2" class="text-center text-muted">
                  Nenhuma punição grave registrada
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
