<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMIM Fantasy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --cmim-yellow: #FFD600;
    --cmim-black: #000000;
}

body {
    background: white;
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: var(--cmim-black);
}

.navbar-brand {
    color: var(--cmim-yellow) !important;
    font-weight: bold;
}

.btn-cmim {
    background: var(--cmim-yellow);
    color: var(--cmim-black);
    font-weight: bold;
    border: none;
}

.btn-cmim:hover {
    background: #ffea70;
}

.hud-card {
    background: white;
    border-left: 6px solid var(--cmim-yellow);
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    padding: 20px;
}

.player-card {
    background: white;
    border-radius: 15px;
    border: 2px solid #f1f1f1;
    padding: 20px;
    transition: 0.3s;
    text-align: center;
    height: 100%;
}

.player-card:hover {
    transform: translateY(-5px);
    border-color: var(--cmim-yellow);
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

.player-img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid var(--cmim-yellow);
    object-fit: cover;
    margin-bottom: 10px;
}

.position-slot {
    border: 2px dashed #ddd;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    min-height: 170px;
}

.position-slot h6 {
    font-weight: bold;
}

.table thead {
    background: var(--cmim-black);
    color: var(--cmim-yellow);
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-4">
  <span class="navbar-brand fs-4">CMIM Fantasy</span>
  <div class="ms-auto">
    <button class="btn btn-cmim me-2" onclick="showTab('time')">Meu Time</button>
    <button class="btn btn-cmim me-2" onclick="showTab('mercado')">Mercado</button>
    <button class="btn btn-cmim" onclick="showTab('torneio')">Torneio</button>
  </div>
</nav>

<div class="container mt-4">

<!-- MEU TIME -->
<div id="time">

<div class="hud-card mb-4 d-flex justify-content-between">
    <div>
        <h3 id="teamName">Favela Team</h3>
        <h5>Pontos: <span id="teamPoints">0</span></h5>
    </div>
    <div>
        <h5>💰 <span id="teamMoney">500</span>M</h5>
    </div>
</div>

<div class="row g-4" id="teamSlots">
</div>

</div>

<!-- MERCADO -->
<div id="mercado" style="display:none">

<h3 class="mb-4">Mercado de Jogadores</h3>
<div class="row g-4" id="marketPlayers"></div>

</div>

<!-- TORNEIO -->
<div id="torneio" style="display:none">

<h3>Ranking Geral</h3>

<table class="table mt-3">
<thead>
<tr>
<th>#</th>
<th>Time</th>
<th>Pontos</th>
<th>Valor</th>
<th>Verba</th>
</tr>
</thead>
<tbody id="rankingTable"></tbody>
</table>

</div>

</div>

<script>

const positions = ["TOP","JG","MID","ADC","SUP"];
let team = {};
let teamMoney = 500;
let teamPoints = 0;

function renderTeam() {
    const container = document.getElementById("teamSlots");
    container.innerHTML = "";

    positions.forEach(pos => {
        const player = team[pos];
        container.innerHTML += `
        <div class="col-md-4 col-lg-2">
            <div class="position-slot">
                <h6>${pos}</h6>
                ${player ? `
                    <img src="${player.img}" class="player-img">
                    <div>${player.name}</div>
                    <small>${player.points} pts</small>
                ` : `<p>Vazio</p>`}
            </div>
        </div>`;
    });

    document.getElementById("teamMoney").innerText = teamMoney;
    document.getElementById("teamPoints").innerText = teamPoints;
}

function addToTeam(player) {
    if(team[player.position]) {
        alert("Você já tem jogador nessa posição!");
        return;
    }

    if(teamMoney < player.price) {
        alert("Dinheiro insuficiente!");
        return;
    }

    team[player.position] = player;
    teamMoney -= player.price;
    teamPoints += player.points;

    renderTeam();
}

function generatePlayers() {
    const container = document.getElementById("marketPlayers");
    container.innerHTML = "";

    for(let i=1;i<=50;i++){
        let position = positions[i%5];
        let price = Math.floor(Math.random()*120)+50;
        let points = Math.floor(Math.random()*30)+5;

        let player = {
            name: "Player"+i,
            position,
            price,
            points,
            img: "https://randomuser.me/api/portraits/men/"+(i%90)+".jpg"
        };

        container.innerHTML += `
        <div class="col-md-4 col-lg-3">
            <div class="player-card">
                <img src="${player.img}" class="player-img">
                <h6>${player.name}</h6>
                <small>${position}</small>
                <p>${points} pts</p>
                <h6>💰 ${price}M</h6>
                <button class="btn btn-cmim w-100" onclick='addToTeam(${JSON.stringify(player)})'>Contratar</button>
            </div>
        </div>`;
    }
}

function renderRanking() {
    const ranking = [
        {name:"Rocket Team", points:480, value:650, money:200},
        {name:"DosNossos", points:450, value:600, money:180},
        {name:"Favela Team", points:teamPoints, value:500-teamMoney+500, money:teamMoney}
    ];

    ranking.sort((a,b)=>b.points-a.points);

    let table = document.getElementById("rankingTable");
    table.innerHTML="";

    ranking.forEach((team,i)=>{
        table.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${team.name}</td>
            <td>${team.points}</td>
            <td>${team.value}M</td>
            <td>${team.money}M</td>
        </tr>`;
    });
}

function showTab(tab) {
    document.getElementById("time").style.display="none";
    document.getElementById("mercado").style.display="none";
    document.getElementById("torneio").style.display="none";
    document.getElementById(tab).style.display="block";

    if(tab==="torneio") renderRanking();
}

generatePlayers();
renderTeam();

</script>

</body>
</html>
