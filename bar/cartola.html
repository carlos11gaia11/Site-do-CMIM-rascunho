<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMIM Fantasy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --cmim-yellow: #FFD600;
    --cmim-black: #000000;
}

body {
    background: white;
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: var(--cmim-black);
}

.navbar-brand {
    color: var(--cmim-yellow) !important;
    font-weight: bold;
}

.btn-cmim {
    background: var(--cmim-yellow);
    color: black;
    font-weight: bold;
    border: none;
}

.btn-cmim:hover {
    background: #ffea70;
}

.card-dashboard {
    background: white;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    padding: 20px;
}

.arrow-up { color: green; font-weight: bold; }
.arrow-down { color: red; font-weight: bold; }

.table thead {
    background: var(--cmim-black);
    color: var(--cmim-yellow);
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-4">
  <span class="navbar-brand fs-4">CMIM Fantasy</span>
  <div class="ms-auto">
    <button class="btn btn-cmim me-2" onclick="showTab('time')">Meu Time</button>
    <button class="btn btn-cmim me-2" onclick="showTab('mercado')">Mercado</button>
    <button class="btn btn-cmim me-2" onclick="showTab('torneio')">Torneio</button>
    <button class="btn btn-cmim" onclick="showTab('valorizacao')">Valorização</button>
  </div>
</nav>

<div class="container mt-4">

<!-- MEU TIME -->
<div id="time">
<h3>Meu Time (mantido)</h3>
</div>

<!-- MERCADO -->
<div id="mercado" style="display:none">
<h3>Mercado (mantido)</h3>
</div>

<!-- TORNEIO -->
<div id="torneio" style="display:none">
<h3>Torneio (mantido)</h3>
</div>

<!-- VALORIZAÇÃO -->
<div id="valorizacao" style="display:none">

<div class="row mb-4">

<div class="col-md-4">
<div class="card-dashboard">
<label class="form-label fw-bold">Selecionar Jogador</label>
<select id="playerSelect" class="form-select"></select>

<div class="mt-3">
<h5 id="currentValue"></h5>
<h6 id="variation"></h6>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card-dashboard text-center">
<h6>Valorização Total</h6>
<h3 id="totalValorization"></h3>
</div>
</div>

<div class="col-md-4">
<div class="card-dashboard text-center">
<h6>Última Pontuação</h6>
<h3 id="lastScore"></h3>
</div>
</div>

</div>

<div class="row">

<div class="col-lg-8 mb-4">
<div class="card-dashboard">
<h5>Evolução de Valor</h5>
<canvas id="valorChart"></canvas>
</div>
</div>

<div class="col-lg-4 mb-4">
<div class="card-dashboard">
<h5>Ranking de Valorização</h5>
<table class="table table-sm mt-3">
<thead>
<tr>
<th>#</th>
<th>Jogador</th>
<th>Valorização</th>
</tr>
</thead>
<tbody id="rankingBody"></tbody>
</table>
</div>
</div>

</div>

</div>

</div>

<script>
function showTab(tab) {
    document.getElementById("time").style.display = "none";
    document.getElementById("mercado").style.display = "none";
    document.getElementById("torneio").style.display = "none";
    document.getElementById("valorizacao").style.display = "none";
    document.getElementById(tab).style.display = "block";
}

const players = [
{ name:"ShadowFury", scores:[18,22,19,24,20], initialValue:100 },
{ name:"IronClaw", scores:[15,16,14,18,17], initialValue:90 },
{ name:"NightHunter", scores:[12,14,15,13,16], initialValue:70 },
{ name:"CrystalShot", scores:[20,21,23,19,22], initialValue:110 }
];

function calculateValues(player){
let values=[player.initialValue];
for(let i=1;i<player.scores.length;i++){
let variation=(player.scores[i]-player.scores[i-1])*2;
values.push(values[i-1]+variation);
}
return values;
}

players.forEach(p=>{
p.values=calculateValues(p);
p.valorization=p.values[p.values.length-1]-p.initialValue;
});

const select=document.getElementById("playerSelect");
players.forEach((p,i)=>{
let option=document.createElement("option");
option.value=i;
option.text=p.name;
select.appendChild(option);
});

let chart;

function updateDashboard(index){
let player=players[index];

document.getElementById("currentValue").innerText=
"Valor Atual: "+player.values[player.values.length-1]+"M";

let variation=player.valorization;
let arrow=variation>=0?
"<span class='arrow-up'>▲ +"+variation+"M</span>":
"<span class='arrow-down'>▼ "+variation+"M</span>";

document.getElementById("variation").innerHTML=arrow;
document.getElementById("totalValorization").innerText=variation+"M";
document.getElementById("lastScore").innerText=
player.scores[player.scores.length-1]+" pts";

if(chart) chart.destroy();

chart=new Chart(document.getElementById("valorChart"),{
type:"line",
data:{
labels:["R1","R2","R3","R4","R5"],
datasets:[{
label:"Valor",
data:player.values,
borderColor:"#FFD600",
backgroundColor:"rgba(255,214,0,0.3)",
tension:0.4,
fill:true
}]
},
options:{
plugins:{legend:{display:false}}
}
});
}

function updateRanking(){
let sorted=[...players].sort((a,b)=>b.valorization-a.valorization);
let body=document.getElementById("rankingBody");
body.innerHTML="";
sorted.forEach((p,i)=>{
body.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.valorization}M</td>
</tr>`;
});
}

select.addEventListener("change",()=>{
updateDashboard(select.value);
});

updateRanking();
updateDashboard(0);
</script>

</body>
</html>
