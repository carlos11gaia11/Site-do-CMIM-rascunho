<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMIM Cartola Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--primary:#FFD600;
--dark:#0f0f0f;
--card:#1a1a1a;
--success:#00c853;
--danger:#ff5252;
}

body{
background:var(--dark);
color:white;
font-family:'Segoe UI',sans-serif;
}

.navbar{
background:#000;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.navbar-brand{
color:var(--primary)!important;
font-weight:bold;
}

.btn-primary-custom{
background:var(--primary);
color:black;
font-weight:bold;
border:none;
}

.btn-primary-custom:hover{
background:#ffe95a;
}

.card-custom{
background:var(--card);
border-radius:18px;
padding:20px;
box-shadow:0 5px 25px rgba(0,0,0,0.4);
}

.player-img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid var(--primary);
object-fit:cover;
}

.slot{
background:#111;
border-radius:15px;
padding:15px;
min-height:180px;
text-align:center;
transition:0.3s;
}

.slot:hover{
background:#1f1f1f;
}

.valor-up{color:var(--success);font-weight:bold;}
.valor-down{color:var(--danger);font-weight:bold;}

.market-card{
transition:0.3s;
cursor:pointer;
}

.market-card:hover{
transform:translateY(-5px);
}

.toast-container{
position:fixed;
top:20px;
right:20px;
z-index:9999;
}
</style>
</head>
<body>

<nav class="navbar px-4 py-3">
<span class="navbar-brand fs-4">CMIM CARTOLA PRO</span>
<div class="ms-auto">
<button class="btn btn-primary-custom me-2" onclick="showTab('time')">Meu Time</button>
<button class="btn btn-primary-custom me-2" onclick="showTab('mercado')">Mercado</button>
<button class="btn btn-primary-custom" onclick="showTab('torneio')">Ranking</button>
</div>
</nav>

<div class="container mt-4">

<div id="time">

<div class="card-custom mb-4 d-flex justify-content-between align-items-center">
<div>
<h4>Pontos Totais: <span id="teamPoints">0</span></h4>
<small>Rodada: <span id="round">0</span></small>
</div>
<div class="text-end">
<h5>💰 <span id="teamMoney">500</span>M</h5>
<h6>Patrimônio: <span id="teamValue">500</span>M</h6>
<button class="btn btn-primary-custom mt-2" onclick="simulateRound()">Simular Rodada</button>
</div>
</div>

<h5 class="mb-3">Escalação</h5>
<div class="row g-4 mb-5" id="teamSlots"></div>

</div>

<div id="mercado" style="display:none">

<div class="d-flex justify-content-between mb-3">
<h4>Mercado</h4>
<select class="form-select w-25" onchange="filterMarket(this.value)">
<option value="ALL">Todas posições</option>
<option value="TOP">TOP</option>
<option value="JG">JG</option>
<option value="MID">MID</option>
<option value="ADC">ADC</option>
<option value="SUP">SUP</option>
</select>
</div>

<div class="row g-4" id="marketPlayers"></div>

</div>

<div id="torneio" style="display:none">
<h4>Ranking Geral</h4>
<div class="card-custom mt-3">
<table class="table table-dark table-striped">
<thead>
<tr>
<th>#</th>
<th>Time</th>
<th>Pontos</th>
<th>Patrimônio</th>
<th>Saldo</th>
</tr>
</thead>
<tbody id="rankingTable"></tbody>
</table>
</div>
</div>

</div>

<div class="toast-container"></div>

<script>

const positions=["TOP","JG","MID","ADC","SUP"];
let team={};
let teamMoney=500;
let teamPoints=0;
let round=0;
let players=[];

function showToast(msg){
const toast=document.createElement("div");
toast.className="toast align-items-center text-bg-warning show mb-2";
toast.innerHTML=`<div class="d-flex"><div class="toast-body">${msg}</div></div>`;
document.querySelector(".toast-container").appendChild(toast);
setTimeout(()=>toast.remove(),3000);
}

function showTab(tab){
["time","mercado","torneio"].forEach(t=>document.getElementById(t).style.display="none");
document.getElementById(tab).style.display="block";
renderRanking();
}

function generatePlayers(){
for(let i=1;i<=50;i++){
let pos=positions[i%5];
let price=Math.floor(Math.random()*60)+80;
let avg=Math.floor(Math.random()*15)+10;

players.push({
id:i,
name:"Player"+i,
position:pos,
price,
value:price,
avg,
history:[],
img:"https://randomuser.me/api/portraits/men/"+(i%90)+".jpg"
});
}
renderMarket(players);
}

function renderMarket(list){
let container=document.getElementById("marketPlayers");
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="col-md-4 col-lg-3">
<div class="card-custom market-card text-center">
<img src="${p.img}" class="player-img mb-2">
<h6>${p.name}</h6>
<small>${p.position}</small>
<p>Média: ${p.avg}</p>
<p>${p.value}M</p>
<button class="btn btn-primary-custom w-100" onclick="addToTeam(${p.id})">Contratar</button>
</div>
</div>`;
});
}

function filterMarket(pos){
if(pos==="ALL"){renderMarket(players);return;}
renderMarket(players.filter(p=>p.position===pos));
}

function addToTeam(id){
let p=players.find(x=>x.id===id);
if(team[p.position]){showToast("Já existe jogador nessa posição");return;}
if(teamMoney<p.value){showToast("Saldo insuficiente");return;}

team[p.position]=p;
teamMoney-=p.value;
showToast("Jogador contratado!");
renderTeam();
}

function removePlayer(pos){
let p=team[pos];
teamMoney+=p.value;
delete team[pos];
showToast("Jogador vendido!");
renderTeam();
}

function renderTeam(){
let container=document.getElementById("teamSlots");
container.innerHTML="";

positions.forEach(pos=>{
let p=team[pos];
container.innerHTML+=`
<div class="col-md-4 col-lg-2">
<div class="slot">
<h6>${pos}</h6>
${p?`
<img src="${p.img}" class="player-img mb-2">
<div>${p.name}</div>
<div class="${p.value>p.price?'valor-up':'valor-down'}">${p.value}M</div>
<button class="btn btn-sm btn-danger mt-2" onclick="removePlayer('${pos}')">Vender</button>
`:`<p>Vazio</p>`}
</div>
</div>`;
});

document.getElementById("teamMoney").innerText=teamMoney;
document.getElementById("teamPoints").innerText=teamPoints;
document.getElementById("teamValue").innerText=teamMoney+Object.values(team).reduce((a,b)=>a+b.value,0);
document.getElementById("round").innerText=round;
}

function simulateRound(){
if(Object.keys(team).length<5){showToast("Escale o time completo!");return;}

round++;
let roundPoints=0;

Object.values(team).forEach(p=>{
let pts=Math.floor(Math.random()*20)+5;
p.history.push(pts);
roundPoints+=pts;

let variation=Math.floor(Math.random()*10)-5;
p.value=Math.max(1,p.value+variation);
});

teamPoints+=roundPoints;
showToast("Rodada finalizada: "+roundPoints+" pontos!");
renderTeam();
renderRanking();
}

function renderRanking(){
let ranking=[
{name:"CMIM Legends",points:620,value:700,money:120},
{name:"Insalubre FC",points:580,value:680,money:150},
{name:"Seu Time",points:teamPoints,value:teamMoney+Object.values(team).reduce((a,b)=>a+b.value,0),money:teamMoney}
];

ranking.sort((a,b)=>b.points-a.points);

let table=document.getElementById("rankingTable");
if(!table)return;

table.innerHTML="";
ranking.forEach((t,i)=>{
table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.points}</td>
<td>${t.value}M</td>
<td>${t.money}M</td>
</tr>`;
});
}

generatePlayers();
renderTeam();

</script>
</body>
</html>
